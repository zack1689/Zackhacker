<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𝙉𝙀𝙒 𝟮𝟬𝟮𝟲 𝙃𝘼𝘾𝙆</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Orbitron',sans-serif;
}

body{
height:100vh;
overflow:hidden;
position:relative;
}

/* FULL SCREEN WEBVIEW */
.webview-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

.webview-bg iframe{
width:100%;
height:100%;
border:none;
}

/* FLOATING CIRCLE */
.modx-wrapper{
position:absolute;
top:140px;
left:60px;
display:flex;
align-items:center;
justify-content:center;
cursor:grab;
z-index:1000;
user-select:none;
}

.particle-ring{
position:relative;
width:70px;
height:70px;
display:flex;
align-items:center;
justify-content:center;
animation:pulse 2s infinite ease-in-out;
}

.particle-ring::before{
content:"";
position:absolute;
width:100%;
height:100%;
border-radius:50%;
background:conic-gradient(#00ffff,#008cff,#00ffcc,#00ffff);
animation:rotate 4s linear infinite;
filter:blur(6px);
}

.particle-ring::after{
content:"";
position:absolute;
width:60px;
height:60px;
border-radius:50%;
background:#00131f;
box-shadow:inset 0 0 25px #00ffff70,0 0 20px #00ffff80;
}

.modx-img{
position:relative;
width:52px;
height:52px;
border-radius:50%;
object-fit:cover;
z-index:2;
}

@keyframes rotate{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

@keyframes pulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.08);}
}

/* PANEL */
.panel{
position:absolute;
width:260px;
background:linear-gradient(180deg,#08222e,#02121c);
border-radius:24px;
border:1px solid rgba(0,255,255,0.45);
box-shadow:0 0 40px #00ffff40,inset 0 0 30px #00ffff20;
padding:18px;
display:none;
backdrop-filter:blur(18px);
color:white;
z-index:2000;
cursor:grab;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}

.injector-title{
font-size:14px;
font-weight:900;
background:linear-gradient(90deg,#00ffff,#00aaff,#00ffff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 0 12px #00ffff;
letter-spacing:2px;
}

.close{
cursor:pointer;
width:26px;
height:26px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
background:#0a2b36;
color:#00ffff;
box-shadow:0 0 10px #00ffff80;
}

.prediction{
text-align:center;
color:#00f7ff;
font-size:11px;
letter-spacing:4px;
margin-bottom:8px;
}

.result{
text-align:center;
font-size:40px;
font-weight:900;
text-shadow:0 0 15px #00ffff,0 0 40px #008cff;
margin-bottom:12px;
transition:transform .2s ease;
}

.live{
display:flex;
justify-content:space-between;
font-size:10px;
color:#9ef0ff;
margin-bottom:16px;
background:#001c28;
padding:6px 10px;
border-radius:30px;
border:1px solid cyan;
}

.period{
margin-top:10px;
background:linear-gradient(145deg,#aaffff,#e0ffff);
color:#001018;
padding:10px 6px;
border-radius:14px;
font-size:11px;
text-align:center;
font-weight:800;
}

.timer{
margin-top:6px;
text-align:center;
font-size:12px;
color:#00ffff;
}
</style>
</head>

<body>

<!-- FULL SCREEN WEBVIEW -->
<div class="webview-bg">
  <iframe src="https://tashanwin15.com"></iframe>
</div>

<!-- FLOATING CIRCLE -->
<div class="modx-wrapper" id="circle">
  <div class="particle-ring">
    <img src="https://i.ibb.co/4ZDFDdNh/ryomensukuna-abx8.png" class="modx-img">
  </div>
</div>

<!-- PANEL -->
<div class="panel" id="panel">
  <div class="top">
    <div class="injector-title">⚡ 𝙉𝙀𝙒 𝟮𝟬𝟮𝟲 𝙃𝘼𝘾𝙆</div>
    <div class="close" id="closeBtn">✖</div>
  </div>

  <div class="prediction">☠️ VIP NEW TOOL 🔥</div>
  <div class="result" id="resultText">BIG 9</div>

  <div class="live">
    <span>🔴 LIVE</span>
    <span>🛡️ ULTRA SECURE</span>
  </div>

  <div class="period" id="periodText">Period: --</div>
  <div class="timer" id="timerText">00:60</div>
</div>

<script>
(function(){

const circle=document.getElementById("circle");
const panel=document.getElementById("panel");
const closeBtn=document.getElementById("closeBtn");

function makeDraggable(el){
let isDown=false,offsetX=0,offsetY=0;

function start(e){
isDown=true;
const rect=el.getBoundingClientRect();
const clientX=e.touches?e.touches[0].clientX:e.clientX;
const clientY=e.touches?e.touches[0].clientY:e.clientY;
offsetX=clientX-rect.left;
offsetY=clientY-rect.top;
}

function move(e){
if(!isDown)return;
e.preventDefault();
const clientX=e.touches?e.touches[0].clientX:e.clientX;
const clientY=e.touches?e.touches[0].clientY:e.clientY;
el.style.left=(clientX-offsetX)+"px";
el.style.top=(clientY-offsetY)+"px";
}

function end(){isDown=false;}

el.addEventListener("mousedown",start);
el.addEventListener("touchstart",start);
document.addEventListener("mousemove",move);
document.addEventListener("touchmove",move,{passive:false});
document.addEventListener("mouseup",end);
document.addEventListener("touchend",end);
}

makeDraggable(circle);
makeDraggable(panel);

circle.onclick=()=>{
panel.style.display="block";
panel.style.left=circle.style.left;
panel.style.top=(parseInt(circle.style.top||140)+100)+"px";
circle.style.display="none";
};

closeBtn.onclick=()=>{
panel.style.display="none";
circle.style.display="flex";
};

})();
</script>

</body>
</html>
